name: Build and Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Install dependencies
      run: bun install

    - name: Build project
      run: bun run build
      env:
        POCKETBASE_URL: ${{ secrets.POCKETBASE_URL }}
        PB_EMAIL: ${{ secrets.PB_EMAIL }}
        PB_PASSWORD: ${{ secrets.PB_PASSWORD }}

    - name: Deploy to VPS via SCP
      uses: appleboy/scp-action@v0.1.3
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        source: "dist/*"
        target: "/var/www/sae401/"
        strip_components: 1
        rm: true
        overwrite: true

    - name: Restart app on VPS
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script: |
          PORT=4321 pm2 restart sae401 || PORT=4321 pm2 start /var/www/sae401/server/entry.mjs --name sae401
